<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NASA Space Explorer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/e/e5/NASA_logo.svg">
  <h3>NASA SPACE EXPLORER</h3>
  <h1>Explore 9 Days of the Cosmos</h1>
</header>

<section class="fact-box">
  <h2>Did You Know?</h2>
  <p id="fact"></p>
</section>

<section class="controls">
  <h2>Choose Your Date Range</h2>

  <input type="date" id="startDate">
  <button onclick="loadGallery()">Load Gallery</button>
</section>

<section id="gallery" class="gallery"></section>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">&times;</span>
    <p id="modal-date"></p>
    <h2 id="modal-title"></h2>
    <img id="modal-img">
    <p id="modal-desc"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
