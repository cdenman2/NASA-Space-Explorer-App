<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --pantone-286: #0033a0;
      --pantone-185: #e4002b;
      --white: #ffffff;
      --black: #000000;
      --soft-text: #e8edf6;
      --card-shadow: 0 18px 36px rgba(0, 0, 0, 0.38);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", Arial, sans-serif;
      color: var(--white);
      background:
        url("https://images-assets.nasa.gov/image/PIA01322/PIA01322~orig.jpg")
        no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    .page-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    .hero,
    .container {
      position: relative;
      z-index: 1;
    }

    .hero {
      padding: 20px 24px 10px;
      min-height: 190px;
    }

    .logo {
      position: absolute;
      top: 22px;
      left: 24px;
      width: 110px;
      height: auto;
      display: block;
    }

    .hero-center {
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
      padding-top: 0;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--pantone-286);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 1.05rem;
    }

    .hero h1 {
      margin: 0;
      font-family: "Inter", Arial, sans-serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(3rem, 6vw, 5.8rem);
      line-height: 1.05;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
    }

    .hero-text {
      margin: 16px auto 0;
      max-width: 780px;
      color: var(--soft-text);
      font-size: 1.1rem;
    }

    .container {
      width: min(1280px, calc(100% - 40px));
      margin: 0 auto;
      padding-bottom: 40px;
    }

    .info-box {
      background: rgba(0, 51, 160, 0.96);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 22px 24px;
      margin: 0 auto 22px;
    }

    .fact-box {
      max-width: 760px;
    }

    .controls-box {
      max-width: 860px;
    }

    .info-box h2 {
      margin: 0 0 18px;
      font-family: "Orbitron", Arial, sans-serif;
      font-size: 2rem;
      text-align: center;
    }

    .fact-box p {
      margin: 0;
      color: var(--pantone-185);
      font-weight: 700;
      text-align: left;
      font-size: 1.1rem;
    }

    .date-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 16px;
      align-items: end;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .field-group label {
      margin-bottom: 8px;
      font-weight: 700;
      color: var(--white);
      font-size: 1rem;
    }

    .field-group input[type="date"] {
      width: 100%;
      height: 56px;
      padding: 0 16px;
      border: 2px solid rgba(0, 0, 0, 0.18);
      border-radius: 14px;
      background: var(--white);
      color: var(--black);
      font: inherit;
      font-size: 1rem;
    }

    .load-btn {
      height: 56px;
      padding: 0 24px;
      border: none;
      border-radius: 14px;
      background: var(--pantone-185);
      color: var(--white);
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(228, 0, 43, 0.28);
    }

    .helper-text {
      margin: 14px 0 0;
      color: var(--soft-text);
      text-align: center;
    }

    .status-wrap {
      max-width: 860px;
      margin: 0 auto 14px;
    }

    .loading,
    .error {
      border-radius: 14px;
      padding: 14px 16px;
      font-weight: 600;
    }

    .loading {
      background: rgba(0, 51, 160, 0.72);
    }

    .error {
      background: rgba(228, 0, 43, 0.22);
      border: 1px solid rgba(228, 0, 43, 0.4);
    }

    .hidden {
      display: none !important;
    }

    .gallery-wrap {
      margin-top: 8px;
    }

    .gallery-wrap h2 {
      margin: 6px 0 10px;
      font-family: "Orbitron", Arial, sans-serif;
      font-size: 2rem;
    }

    .range-text {
      margin: 0 0 18px;
      color: var(--soft-text);
      font-size: 1.05rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(0, 51, 160, 0.96);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      cursor: pointer;
      transition: transform 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card-image-wrap {
      position: relative;
      aspect-ratio: 16 / 10;
      background: #000;
      overflow: hidden;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--pantone-185);
      color: var(--white);
      font-size: 0.76rem;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .card-body {
      padding: 16px 18px 20px;
    }

    .card-date {
      margin: 0 0 8px;
      color: var(--pantone-185);
      font-weight: 700;
      font-size: 1rem;
    }

    .card-title {
      margin: 0;
      color: var(--white);
      font-size: 1.05rem;
      line-height: 1.35;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
    }

    .modal-content {
      position: relative;
      width: min(980px, calc(100% - 24px));
      max-height: 90vh;
      overflow-y: auto;
      margin: 4vh auto;
      background: rgba(7, 16, 34, 0.98);
      border-radius: 22px;
      padding: 22px;
      z-index: 1;
    }

    .close-btn {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      color: var(--white);
      font-size: 1.6rem;
      cursor: pointer;
    }

    .modal-date {
      margin: 0 50px 10px 0;
      color: var(--pantone-185);
      font-weight: 700;
      font-size: 1rem;
    }

    .modal-content h3 {
      margin: 0 50px 16px 0;
      font-family: "Orbitron", Arial, sans-serif;
      font-size: 1.5rem;
    }

    .modal-media {
      width: 100%;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
    }

    .modal-media img,
    .modal-media iframe {
      width: 100%;
      display: block;
    }

    .modal-media img {
      max-height: 60vh;
      object-fit: contain;
    }

    .modal-media iframe {
      aspect-ratio: 16 / 9;
      border: 0;
    }

    .modal-desc {
      margin: 18px 0 0;
      color: var(--soft-text);
      line-height: 1.7;
    }

    @media (max-width: 980px) {
      .date-form {
        grid-template-columns: 1fr;
      }

      .gallery {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 20px, 1280px);
      }

      .logo {
        width: 84px;
        top: 18px;
        left: 18px;
      }

      .hero {
        padding: 18px 10px 10px;
        min-height: 150px;
      }

      .hero-center {
        padding-top: 70px;
      }

      .info-box h2,
      .gallery-wrap h2 {
        font-size: 1.6rem;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-overlay"></div>

  <header class="hero">
    <img
      class="logo"
      src="https://upload.wikimedia.org/wikipedia/commons/e/e5/NASA_logo.svg"
      alt="NASA logo"
    />

    <div class="hero-center">
      <p class="eyebrow">NASA SPACE EXPLORER</p>
      <h1>Explore 9 Days of the Cosmos</h1>
      <p class="hero-text">
        Choose a start date and view 9 APOD entries beginning from that date.
      </p>
    </div>
  </header>

  <main class="container">
    <section class="info-box fact-box">
      <h2>Did You Know?</h2>
      <p id="fact"></p>
    </section>

    <section class="info-box controls-box">
      <h2>Choose Your Date Range</h2>

      <form id="date-form" class="date-form">
        <div class="field-group">
          <label for="startDate">Start Date</label>
          <input type="date" id="startDate" required />
        </div>

        <div class="field-group">
          <label for="endDate">End Date</label>
          <input type="date" id="endDate" readonly />
        </div>

        <button type="submit" class="load-btn">Load Gallery</button>
      </form>

      <p class="helper-text">The app always displays 9 gallery entries.</p>
    </section>

    <section class="status-wrap">
      <div id="loading" class="loading hidden">Loading NASA gallery...</div>
      <div id="errorBox" class="error hidden"></div>
    </section>

    <section class="gallery-wrap">
      <h2>Gallery</h2>
      <p id="rangeText" class="range-text">No gallery loaded yet.</p>
      <div id="gallery" class="gallery"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <div id="modalBackdrop" class="modal-backdrop"></div>

    <div class="modal-content">
      <button id="closeModal" class="close-btn" aria-label="Close modal">&times;</button>
      <p id="modalDate" class="modal-date"></p>
      <h3 id="modalTitle"></h3>
      <div id="modalMedia" class="modal-media"></div>
      <p id="modalDesc" class="modal-desc"></p>
    </div>
  </div>

  <script>
    const API_KEY = "AjvYQFb3iYJhytw727jMtAjsHGCw5cqvy3nTLyRS";

    const facts = [
      "Saturn is less dense than water.",
      "Jupiter is so large that more than 1,300 Earths could fit inside it.",
      "Neutron stars can spin more than 600 times per second.",
      "Light from the Sun takes about 8 minutes to reach Earth.",
      "Mars has the largest volcano in the solar system: Olympus Mons."
    ];

    const factEl = document.getElementById("fact");
    const form = document.getElementById("date-form");
    const startDateInput = document.getElementById("startDate");
    const endDateInput = document.getElementById("endDate");
    const gallery = document.getElementById("gallery");
    const loading = document.getElementById("loading");
    const errorBox = document.getElementById("errorBox");
    const rangeText = document.getElementById("rangeText");

    const modal = document.getElementById("modal");
    const modalBackdrop = document.getElementById("modalBackdrop");
    const closeModalBtn = document.getElementById("closeModal");
    const modalDate = document.getElementById("modalDate");
    const modalTitle = document.getElementById("modalTitle");
    const modalMedia = document.getElementById("modalMedia");
    const modalDesc = document.getElementById("modalDesc");

    factEl.textContent = facts[Math.floor(Math.random() * facts.length)];

    function formatDateForInput(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function createLocalDate(dateString) {
      const [year, month, day] = dateString.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function addDays(dateString, days) {
      const date = createLocalDate(dateString);
      date.setDate(date.getDate() + days);
      return formatDateForInput(date);
    }

    function formatReadableDate(dateString) {
      const date = createLocalDate(dateString);
      return date.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function getYesterday() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return formatDateForInput(d);
    }

    function setDefaultDates() {
      const yesterday = getYesterday();
      const start = addDays(yesterday, -8);
      startDateInput.min = "1995-06-16";
      startDateInput.max = yesterday;
      startDateInput.value = start;
      endDateInput.value = yesterday;
    }

    function updateEndDate() {
      if (!startDateInput.value) return;
      endDateInput.value = addDays(startDateInput.value, 8);
    }

    function showLoading() {
      loading.classList.remove("hidden");
    }

    function hideLoading() {
      loading.classList.add("hidden");
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.remove("hidden");
    }

    function hideError() {
      errorBox.textContent = "";
      errorBox.classList.add("hidden");
    }

    function normalizeVideoUrl(url) {
      if (!url) return "";
      if (url.includes("youtube.com/watch?v=")) {
        return url.replace("watch?v=", "embed/");
      }
      if (url.includes("youtu.be/")) {
        const videoId = url.split("youtu.be/")[1].split("?")[0];
        return `https://www.youtube.com/embed/${videoId}`;
      }
      return url;
    }

    function openModal(item) {
      modalDate.textContent = formatReadableDate(item.date);
      modalTitle.textContent = item.title;
      modalDesc.textContent = item.explanation || "";
      modalMedia.innerHTML = "";

      if (item.media_type === "video") {
        const iframe = document.createElement("iframe");
        iframe.src = normalizeVideoUrl(item.url);
        iframe.title = item.title;
        iframe.allowFullscreen = true;
        modalMedia.appendChild(iframe);
      } else {
        const img = document.createElement("img");
        img.src = item.hdurl || item.url;
        img.alt = item.title;
        modalMedia.appendChild(img);
      }

      modal.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      modal.classList.add("hidden");
      modalMedia.innerHTML = "";
      document.body.style.overflow = "";
    }

    function createCard(item) {
      const card = document.createElement("article");
      card.className = "card";

      const imageSrc =
        item.media_type === "video"
          ? (item.thumbnail_url || "")
          : (item.url || "");

      card.innerHTML = `
        <div class="card-image-wrap">
          <img src="${imageSrc}" alt="${item.title}">
          ${item.media_type === "video" ? '<span class="video-badge">VIDEO</span>' : ""}
        </div>
        <div class="card-body">
          <p class="card-date">${formatReadableDate(item.date)}</p>
          <h3 class="card-title">${item.title}</h3>
        </div>
      `;

      card.addEventListener("click", function () {
        openModal(item);
      });

      return card;
    }

    async function fetchApodRange(startDate, endDate) {
      const url =
        `https://api.nasa.gov/planetary/apod?api_key=${API_KEY}&start_date=${startDate}&end_date=${endDate}&thumbs=true`;

      const response = await fetch(url);
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.msg || "NASA API error.");
      }

      if (!Array.isArray(data)) {
        throw new Error("Unexpected NASA API response.");
      }

      data.sort(function (a, b) {
        return createLocalDate(a.date) - createLocalDate(b.date);
      });

      return data;
    }

    async function fetchNineEntries(startDate) {
      const collected = [];
      const usedDates = new Set();
      let searchStart = startDate;
      let attempts = 0;

      while (collected.length < 9 && attempts < 10) {
        const searchEnd = addDays(searchStart, 15);
        const batch = await fetchApodRange(searchStart, searchEnd);

        for (const item of batch) {
          if (!usedDates.has(item.date)) {
            usedDates.add(item.date);
            collected.push(item);
          }
          if (collected.length === 9) break;
        }

        searchStart = addDays(searchEnd, 1);
        attempts++;
      }

      if (collected.length < 9) {
        throw new Error("Unable to load 9 APOD entries.");
      }

      return collected.slice(0, 9);
    }

    async function loadGallery(startDate) {
      showLoading();
      hideError();
      gallery.innerHTML = "";

      try {
        const items = await fetchNineEntries(startDate);

        items.forEach(function (item) {
          gallery.appendChild(createCard(item));
        });

        endDateInput.value = items[8].date;
        rangeText.textContent =
          `${formatReadableDate(items[0].date)} through ${formatReadableDate(items[8].date)}`;
      } catch (error) {
        showError(error.message);
        rangeText.textContent = "Gallery could not be loaded.";
      } finally {
        hideLoading();
      }
    }

    startDateInput.addEventListener("change", async function () {
      updateEndDate();
      if (startDateInput.value) {
        await loadGallery(startDateInput.value);
      }
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      const startDate = startDateInput.value;
      const yesterday = getYesterday();

      if (!startDate) {
        showError("Please choose a start date.");
        return;
      }

      if (startDate < "1995-06-16") {
        showError("Start date cannot be before 1995-06-16.");
        return;
      }

      if (startDate > yesterday) {
        showError("Start date cannot be in the future.");
        return;
      }

      await loadGallery(startDate);
    });

    closeModalBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", closeModal);

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape" && !modal.classList.contains("hidden")) {
        closeModal();
      }
    });

    setDefaultDates();
    updateEndDate();
    loadGallery(startDateInput.value);
  </script>
</body>
</html>
